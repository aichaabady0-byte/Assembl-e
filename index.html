<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de Score Personnalisable - RP</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main-scoreboard">
    <div class="board-header">
      <div class="country-info">
        <p class="board-subtitle">FIFA 26</p>
        <h1 id="country-slogan">Chargement du slogan...</h1>
      </div>
    </div>

    <hr class="board-divider">

    <div class="scores-container">
      
      <div id="card-1" class="score-card">
        <div class="team-header">
          <img id="flag-1" src="" alt="Drapeau Équipe 1" class="team-flag">
          <div>
            <h2 id="name-1" class="card-title">Équipe 1</h2>
            <p id="slogan-1" class="team-slogan">Slogan Équipe 1</p>
          </div>
        </div>
        <div id="score-1" class="score-display">00</div>
      </div>

      <div id="card-2" class="score-card">
        <div class="team-header">
          <img id="flag-2" src="" alt="Drapeau Équipe 2" class="team-flag">
          <div>
            <h2 id="name-2" class="card-title">Équipe 2</h2>
            <p id="slogan-2" class="team-slogan">Slogan Équipe 2</p>
          </div>
        </div>
        <div id="score-2" class="score-display">00</div>
      </div>

    </div>
  </div>

  <div id="admin-modal" class="admin-overlay">
    <div class="admin-box">
      <div class="admin-header">
        <h2><i class="ri-settings-4-line"></i> Configuration du Tableau</h2>
        <button id="close-admin" class="btn-close">&times;</button>
      </div>
      
      <div class="admin-body">
        <div class="input-group">
          <label>Slogan Principal du Pays</label>
          <input type="text" id="input-slogan-country">
        </div>

        <div class="admin-columns">
          <div class="admin-col">
            <h3>Équipe 1</h3>
            <div class="input-group">
              <label>Nom</label>
              <input type="text" id="input-name-1">
            </div>
            <div class="input-group">
              <label>Slogan de l'Équipe</label>
              <input type="text" id="input-slogan-1">
            </div>
            <div class="input-group">
              <label>URL Drapeau / Image</label>
              <input type="url" id="input-flag-1">
            </div>
            <div class="input-group-row">
              <div class="input-group">
                <label>Points</label>
                <input type="number" id="input-score-1">
              </div>
              <div class="input-group">
                <label>Couleur</label>
                <input type="color" id="input-color-1" value="#3b82f6">
              </div>
            </div>
          </div>

          <div class="admin-col">
            <h3>Équipe 2</h3>
            <div class="input-group">
              <label>Nom</label>
              <input type="text" id="input-name-2">
            </div>
            <div class="input-group">
              <label>Slogan de l'Équipe</label>
              <input type="text" id="input-slogan-2">
            </div>
            <div class="input-group">
              <label>URL Drapeau / Image</label>
              <input type="url" id="input-flag-2">
            </div>
            <div class="input-group-row">
              <div class="input-group">
                <label>Points</label>
                <input type="number" id="input-score-2">
              </div>
              <div class="input-group">
                <label>Couleur</label>
                <input type="color" id="input-color-2" value="#ef4444">
              </div>
            </div>
          </div>
        </div>

        <button id="save-admin-btn" class="btn-save">Mettre à jour le Tableau</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <script src="script.js"></script>
</body>
</html>
